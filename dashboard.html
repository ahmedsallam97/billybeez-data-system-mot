<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BDS MOT Dashboard</title>

<style>
body{
  font-family: Arial;
  margin:0;
  background:#f4f4f4;
}

.header{
  background:#5B2C83;
  color:white;
  padding:15px;
  text-align:center;
}

.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:15px;
  padding:20px;
}

.card{
  background:white;
  padding:20px;
  border-radius:15px;
  box-shadow:0 2px 10px rgba(0,0,0,.1);
  text-align:center;
  cursor:pointer;
  font-size:18px;
}

.card:hover{
  background:#F7E500;
}
</style>

</head>

<body>

<div class="header">
<h2>BillyBeez Data System MOT</h2>
</div>

<div class="grid">

<div class="card" onclick="go('cashier')">🟡 أوردر جديد</div>
<div class="card" onclick="go('orders')">📦 الأوردرات</div>
<div class="card" onclick="go('search')">🔍 بحث</div>
<div class="card" onclick="go('reports')">📊 التقارير</div>

</div>

<script>

function go(page){
  alert("هنفتح: " + page);
}

</script>

</body>
</html>
