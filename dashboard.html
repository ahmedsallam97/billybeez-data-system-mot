<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<title>Manager Dashboard</title>

<style>

body{
  font-family:Arial;
  margin:0;
  background:#f4f4f4;
}

.header{
  background:#2c3e50;
  color:white;
  padding:15px;
  text-align:center;
  position:relative;
}

.logout{
  position:absolute;
  left:15px;
  top:10px;
  border:none;
  background:#e74c3c;
  color:white;
  padding:8px 15px;
  border-radius:8px;
  cursor:pointer;
  font-size:14px;
}

.logout:hover{
  opacity:.9;
}

.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.card{
  background:white;
  padding:15px;
  border-radius:12px;
  text-align:center;
  box-shadow:0 2px 5px rgba(0,0,0,.1);
}

.value{
  font-size:22px;
  font-weight:bold;
  margin-top:5px;
}

.table{
  background:white;
  margin:10px;
  padding:10px;
  border-radius:10px;
}

.row{
  display:flex;
  justify-content:space-between;
  padding:8px 0;
  border-bottom:1px solid #eee;
}

h3{
  margin-top:0;
}

</style>

</head>

<body>

<div class="header">

Manager Dashboard 📊

<button class="logout" onclick="logout()">
Logout
</button>

</div>

<div class="grid">

<div class="card">
Total Sales
<div class="value" id="sales">0 EGP</div>
</div>

<div class="card">
Orders
<div class="value" id="orders">0</div>
</div>

<div class="card">
Pending
<div class="value" id="pending">0</div>
</div>

</div>

<div class="table">

<h3>Top Bracelets</h3>

<div id="top"></div>

</div>

<script src="config.js"></script>

<script>

// حماية الصفحة
const user = localStorage.getItem("currentUser");

if(!user){
  window.location.href = "index.html";
}

async function load(){

  try{

    const res =
      await fetch(API_URL + "?action=getDashboard");

    const d =
      await res.json();

    document.getElementById("sales").innerText =
      (d.totalSales || 0) + " EGP";

    document.getElementById("orders").innerText =
      d.ordersCount || 0;

    document.getElementById("pending").innerText =
      d.pending || 0;

    let box =
      document.getElementById("top");

    box.innerHTML = "";

    if(d.topBracelets){

      d.topBracelets.forEach(b=>{

        box.innerHTML += `
        <div class="row">
          <span>${b.bracelet}</span>
          <span>${b.total} EGP</span>
        </div>
        `;

      });

    }

  }catch(error){

    console.error(error);

  }

}

function logout(){

  localStorage.removeItem("currentUser");

  window.location.href = "index.html";

}

load();

setInterval(load,5000);

</script>

</body>

</html>
