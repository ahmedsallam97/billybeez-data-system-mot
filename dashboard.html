<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manager Dashboard</title>

<style>

body{font-family:Arial,sans-serif;margin:0;background:#f6f7f9;color:#222}
.header{background:#2c3e50;color:#fff;padding:14px;text-align:center;position:sticky;top:0;z-index:5}
.header-title{font-size:20px;font-weight:bold}
.logout,.history{position:absolute;top:9px;border:0;border-radius:8px;color:#fff;padding:8px 14px;cursor:pointer}
.logout{left:12px;background:#e74c3c}
.history{right:12px;background:#5B2C83}
.container{padding:14px;max-width:1280px;margin:0 auto}
.tabs{display:flex;gap:8px;overflow:auto;margin-bottom:12px}
.tabs button{border:1px solid #ddd;background:#fff;color:#333;border-radius:8px;padding:10px 14px;cursor:pointer;white-space:nowrap}
.tabs button.active{background:#2c3e50;color:#fff;border-color:#2c3e50}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.card,.panel{background:#fff;border:1px solid #e6e6e6;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.card{padding:14px;text-align:center}
.label{color:#666;font-size:13px}
.value{font-size:24px;font-weight:bold;margin-top:6px;color:#5B2C83}
.panel{padding:12px;margin-top:12px}
.panel h3{margin:0 0 10px}
.charts{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.tables{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.row{display:flex;justify-content:space-between;gap:10px;padding:8px 0;border-bottom:1px solid #eee}
.row:last-child{border-bottom:0}
canvas{width:100%;height:260px;border:1px solid #eee;border-radius:8px;background:#fff}
.note{background:#fff8e1;border:1px solid #f1d27a;border-radius:8px;padding:10px;margin-top:12px;color:#5f4700}
.orders-toolbar{display:flex;justify-content:space-between;gap:10px;align-items:center;margin-bottom:10px}
.orders-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.order-card{background:#fff;border:1px solid #e6e6e6;border-radius:8px;padding:12px;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.order-head{display:flex;justify-content:space-between;gap:8px;border-bottom:1px solid #eee;padding-bottom:8px;margin-bottom:8px}
.order-meta{display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:13px;color:#444}
.badge{display:inline-block;border-radius:999px;padding:4px 8px;background:#eef2f7;color:#2c3e50;font-weight:bold;font-size:12px}
.badge.unpaid{background:#fdecea;color:#c0392b}
.badge.paid{background:#eafaf1;color:#1e8449}
.order-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.orders-toolbar button,.order-actions button,.modal-actions button{border:0;border-radius:8px;padding:9px 12px;color:#fff;cursor:pointer;background:#5B2C83}
.orders-toolbar .secondary,.order-actions .secondary,.modal-actions .secondary{background:#2c3e50}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;padding:14px;z-index:20}
.modal.hidden{display:none}
.modal-box{background:#fff;border-radius:8px;max-width:720px;width:100%;max-height:90vh;overflow:auto;padding:14px}
.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0}
.items{background:#fafafa;border-radius:8px;padding:8px;margin-top:8px}
.item-line{display:flex;justify-content:space-between;gap:8px;padding:6px 0;border-bottom:1px solid #eee}
.item-line:last-child{border-bottom:0}
.empty{text-align:center;color:#777;padding:16px}
select{padding:10px;border:1px solid #ddd;border-radius:8px;background:#fff}

@media(max-width:900px){
  .grid,.charts,.tables,.orders-grid,.modal-grid{grid-template-columns:1fr}
  .logout,.history{position:static;margin-top:8px}
}

</style>
</head>

<body>

<div class="header">
  <div class="header-title">Manager Dashboard</div>
  <button class="history" onclick="window.location.href='orders.html'">Orders</button>
  <button class="logout" onclick="logout()">Logout</button>
</div>

<div class="container">

<div class="tabs">
  <button class="active" onclick="setFilter('All',this)">All</button>
  <button onclick="setFilter('Cash',this)">Cash</button>
  <button onclick="setFilter('Visa',this)">Visa</button>
  <button onclick="setFilter('Unpaid',this)">Unpaid</button>
</div>

<div class="grid">
  <div class="card"><div class="label">Total Paid Sales</div><div class="value" id="sales">0 EGP</div></div>
  <div class="card"><div class="label">Orders</div><div class="value" id="orders">0</div></div>
  <div class="card"><div class="label">Pending / Unpaid</div><div class="value" id="pending">0</div></div>
  <div class="card"><div class="label">Left Unpaid Alerts</div><div class="value" id="leftUnpaid">0</div></div>
</div>

<div class="note" id="managerNote"></div>

<div class="charts">
  <div class="panel">
    <h3>Payment Breakdown</h3>
    <canvas id="paymentChart" width="600" height="260"></canvas>
  </div>
  <div class="panel">
    <h3>Daily Sales</h3>
    <canvas id="dailyChart" width="600" height="260"></canvas>
  </div>
</div>

<div class="tables">
  <div class="panel"><h3>Top Products</h3><div id="topProducts"></div></div>
  <div class="panel"><h3>Cashier Performance</h3><div id="cashiers"></div></div>
  <div class="panel"><h3>Data Employees</h3><div id="dataEmployees"></div></div>
</div>

<div class="tables">
  <div class="panel"><h3>Status Breakdown</h3><div id="statuses"></div></div>
  <div class="panel"><h3>Top Bracelets</h3><div id="topBracelets"></div></div>
  <div class="panel"><h3>Manager Actions</h3><div id="actions"></div></div>
</div>

<div class="panel">
  <div class="orders-toolbar">
    <h3 id="ordersTitle">Orders</h3>
    <button onclick="load()">Refresh</button>
  </div>
  <div class="orders-grid" id="managerOrders"></div>
</div>

</div>

<div class="modal hidden" id="orderModal">
  <div class="modal-box">
    <div class="orders-toolbar">
      <h3 id="modalTitle">Order Details</h3>
      <button class="secondary" onclick="closeOrderModal()">Close</button>
    </div>
    <div id="modalContent"></div>
  </div>
</div>

<script src="config.js"></script>
<script src="auth.js"></script>

<script>

const currentUser=requireRole(["manager","admin"]);
let dashboardData=null;
let filter="All";
let selectedOrder=null;

function setFilter(value,button){
  filter=value;
  document.querySelectorAll(".tabs button").forEach(btn=>btn.classList.remove("active"));
  button.classList.add("active");
  render();
}

async function load(){
  const res=await fetch(API_URL+"?action=getDashboard");
  dashboardData=await res.json();
  render();
}

function render(){
  if(!dashboardData) return;

  const d=dashboardData;
  const paymentTotal=getPaymentValue(d.paymentBreakdown || [],filter);
  const paymentCount=getPaymentValue(d.paymentCounts || [],filter);
  const filteredSales=filter==="All" ? d.totalSales : filter==="Unpaid" ? 0 : paymentTotal;
  const filteredOrders=filter==="All" ? d.ordersCount : filter==="Unpaid" ? d.unpaidOrders : paymentCount;
  const filteredPending=filter==="Unpaid" ? d.unpaidOrders : d.pending;

  document.getElementById("sales").innerText=(filteredSales || 0)+" EGP";
  document.getElementById("orders").innerText=filteredOrders || 0;
  document.getElementById("pending").innerText=filteredPending || 0;
  document.getElementById("leftUnpaid").innerText=d.leftUnpaid || 0;

  document.getElementById("managerNote").innerText=
    "اقتراحات متابعة: راقب Left Unpaid يوميًا، راجع أفضل المنتجات للمخزون، وقارن أداء الكاشير وموظف الداتا في نهاية كل شيفت.";

  renderRows("topProducts",filterProducts(d.topProducts || []),"product","total"," EGP");
  renderRows("cashiers",filterPeople(d.cashierPerformance || []),"name","total"," EGP");
  renderRows("dataEmployees",filterPeople(d.dataEmployeePerformance || []),"name","total"," EGP");
  renderRows("statuses",d.statusBreakdown || [],"status","total","");
  renderRows("topBracelets",d.topBracelets || [],"bracelet","total"," EGP");
  renderActions();
  renderManagerOrders();

  drawBarChart("paymentChart",d.paymentBreakdown || [],"method","total");
  drawLineChart("dailyChart",d.dailySales || [],"date","total");
}

function filterProducts(rows){
  return rows;
}

function getPaymentValue(rows,method){
  if(method==="All") return 0;
  const row=rows.find(r=>r.method===method);
  return row ? row.total : 0;
}

function filterPeople(rows){
  return rows;
}

function renderRows(id,rows,labelKey,valueKey,suffix){
  const box=document.getElementById(id);
  box.innerHTML="";

  if(!rows.length){
    box.innerHTML="<div class='row'><span>No data</span><span>0</span></div>";
    return;
  }

  rows.slice(0,8).forEach(row=>{
    box.innerHTML+=`
      <div class="row">
        <span>${row[labelKey]}</span>
        <b>${row[valueKey]}${suffix}</b>
      </div>
    `;
  });
}

function renderActions(){
  document.getElementById("actions").innerHTML=`
    <div class="row"><span>Review unpaid exits</span><b>${dashboardData.leftUnpaid || 0}</b></div>
    <div class="row"><span>Archived orders</span><b>${dashboardData.archivedOrders || 0}</b></div>
    <div class="row"><span>Paid orders</span><b>${dashboardData.paidOrders || 0}</b></div>
    <div class="row"><span>Unpaid orders</span><b>${dashboardData.unpaidOrders || 0}</b></div>
  `;
}

function getFilteredOrders(){
  const orders=(dashboardData && dashboardData.orders) || [];

  if(filter==="Unpaid"){
    return orders.filter(order=>order.paymentStatus!=="Paid");
  }

  if(filter==="Cash" || filter==="Visa"){
    return orders.filter(order=>order.paymentStatus==="Paid" && order.paymentMethod===filter);
  }

  return orders;
}

function renderManagerOrders(){
  const box=document.getElementById("managerOrders");
  const orders=getFilteredOrders();
  document.getElementById("ordersTitle").innerText=filter==="All" ? "Orders" : filter+" Orders";
  box.innerHTML="";

  if(!orders.length){
    box.innerHTML="<div class='empty'>No orders found</div>";
    return;
  }

  orders.slice(0,60).forEach(order=>{
    const paymentClass=order.paymentStatus==="Paid" ? "paid" : "unpaid";
    const itemsCount=(order.items || []).reduce((sum,item)=>sum+(Number(item.qty) || 0),0);
    const card=document.createElement("div");
    card.className="order-card";
    card.innerHTML=`
      <div class="order-head">
        <b>${order.orderId}</b>
        <span class="badge ${paymentClass}">${order.paymentStatus}</span>
      </div>
      <div class="order-meta">
        <span>Bracelet: <b>${order.bracelet || ""}</b></span>
        <span>Total: <b>${order.total} EGP</b></span>
        <span>Child: <b>${order.childName || ""}</b></span>
        <span>Items: <b>${itemsCount}</b></span>
        <span>Kitchen: <b>${order.kitchenStatus || ""}</b></span>
        <span>Method: <b>${order.paymentMethod || "-"}</b></span>
      </div>
      <div class="order-actions">
        <button onclick="openOrderModal('${order.orderId}')">Details</button>
        <button class="secondary" onclick="printInvoice('${order.orderId}')">Print Invoice</button>
      </div>
    `;
    box.appendChild(card);
  });
}

function openOrderModal(orderId){
  selectedOrder=((dashboardData && dashboardData.orders) || []).find(order=>order.orderId===orderId);

  if(!selectedOrder) return;

  const items=(selectedOrder.items || []).length
    ? selectedOrder.items.map(item=>`
      <div class="item-line">
        <span>${item.name} x ${item.qty}</span>
        <span>${item.total} EGP</span>
      </div>
    `).join("")
    : "<div class='empty'>No items</div>";

  document.getElementById("modalTitle").innerText=selectedOrder.orderId;
  document.getElementById("modalContent").innerHTML=`
    <div class="modal-grid">
      <div>Bracelet: <b>${selectedOrder.bracelet || ""}</b></div>
      <div>Children: <b>${selectedOrder.childName || ""}</b></div>
      <div>Cashier: <b>${selectedOrder.cashier || ""}</b></div>
      <div>Data Employee: <b>${selectedOrder.dataEmployee || "-"}</b></div>
      <div>Kitchen Status: <b>${selectedOrder.kitchenStatus || ""}</b></div>
      <div>Payment Status: <b>${selectedOrder.paymentStatus || ""}</b></div>
      <div>Payment Method: <b>${selectedOrder.paymentMethod || "-"}</b></div>
      <div>Total: <b>${selectedOrder.total} EGP</b></div>
      <div>Time: <b>${selectedOrder.time || ""}</b></div>
      <div>Archived: <b>${selectedOrder.archivedAt ? "Yes" : "No"}</b></div>
    </div>
    <label>Change payment method</label>
    <select id="managerPaymentMethod">
      <option value="Cash" ${selectedOrder.paymentMethod==="Cash" ? "selected" : ""}>Cash</option>
      <option value="Visa" ${selectedOrder.paymentMethod==="Visa" ? "selected" : ""}>Visa</option>
    </select>
    <div class="items">${items}</div>
    <div class="modal-actions order-actions">
      <button onclick="savePaymentMethod()">Save Payment</button>
      <button class="secondary" onclick="printInvoice('${selectedOrder.orderId}')">Print Invoice</button>
    </div>
  `;
  document.getElementById("orderModal").classList.remove("hidden");
}

function closeOrderModal(){
  selectedOrder=null;
  document.getElementById("orderModal").classList.add("hidden");
}

async function savePaymentMethod(){
  if(!selectedOrder) return;

  const paymentMethod=document.getElementById("managerPaymentMethod").value || "Cash";
  const res=await fetch(API_URL+"?action=updateOrderStatus",{
    method:"POST",
    body:JSON.stringify({
      orderId:selectedOrder.orderId,
      status:"Paid",
      paymentMethod:paymentMethod
    })
  });
  const data=await res.json();

  if(!data.success){
    alert(data.error || "Payment update failed");
    return;
  }

  closeOrderModal();
  await load();
}

function printInvoice(orderId){
  window.open("invoice.html?id="+orderId,"_blank");
}

function drawBarChart(id,rows,labelKey,valueKey){
  const canvas=document.getElementById(id);
  const ctx=canvas.getContext("2d");
  ctx.clearRect(0,0,canvas.width,canvas.height);
  const max=Math.max(...rows.map(r=>r[valueKey]),1);
  const barWidth=canvas.width/(rows.length || 1)-24;

  rows.forEach((row,index)=>{
    const height=(row[valueKey]/max)*(canvas.height-60);
    const x=18+index*(barWidth+24);
    const y=canvas.height-height-34;
    ctx.fillStyle=["#5B2C83","#2980b9","#95a5a6"][index%3];
    ctx.fillRect(x,y,barWidth,height);
    ctx.fillStyle="#222";
    ctx.fillText(row[labelKey],x,canvas.height-14);
    ctx.fillText(row[valueKey],x,y-8);
  });
}

function drawLineChart(id,rows,labelKey,valueKey){
  const canvas=document.getElementById(id);
  const ctx=canvas.getContext("2d");
  ctx.clearRect(0,0,canvas.width,canvas.height);

  if(!rows.length){
    ctx.fillText("No data",20,30);
    return;
  }

  const max=Math.max(...rows.map(r=>r[valueKey]),1);
  const step=rows.length>1 ? (canvas.width-50)/(rows.length-1) : 0;

  ctx.strokeStyle="#5B2C83";
  ctx.lineWidth=3;
  ctx.beginPath();
  rows.forEach((row,index)=>{
    const x=25+index*step;
    const y=canvas.height-35-(row[valueKey]/max)*(canvas.height-70);
    if(index===0) ctx.moveTo(x,y);
    else ctx.lineTo(x,y);
  });
  ctx.stroke();

  rows.forEach((row,index)=>{
    const x=25+index*step;
    const y=canvas.height-35-(row[valueKey]/max)*(canvas.height-70);
    ctx.fillStyle="#5B2C83";
    ctx.beginPath();
    ctx.arc(x,y,4,0,Math.PI*2);
    ctx.fill();
    ctx.fillStyle="#222";
    ctx.fillText(row[labelKey].slice(5),x-18,canvas.height-12);
  });
}

if(currentUser){
  load();
  setInterval(load,10000);
}

</script>

</body>
</html>
