<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cashier - BillyBeez MOT</title>

<style>

body{
  font-family: Arial;
  margin:0;
  background:#f5f5f5;
}

.header{
  background:#5B2C83;
  color:white;
  padding:15px;
  text-align:center;
}

.container{
  padding:15px;
}

input{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:10px;
  border:1px solid #ddd;
  font-size:16px;
}

.section-title{
  margin-top:15px;
  font-weight:bold;
  color:#333;
}

.products{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  margin-top:10px;
}

.product{
  background:white;
  padding:10px;
  border-radius:12px;
  text-align:center;
  cursor:pointer;
  box-shadow:0 2px 6px rgba(0,0,0,.1);
}

.product:hover{
  background:#F7E500;
}

.cart{
  margin-top:15px;
  background:white;
  padding:10px;
  border-radius:12px;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#5B2C83;
  color:white;
  font-size:16px;
  cursor:pointer;
}

button:hover{
  opacity:.9;
}

.small{
  font-size:12px;
  color:gray;
}

</style>

</head>

<body>

<div class="header">
Cashier System - BillyBeez MOT
</div>

<div class="container">

<div class="section-title">رقم البريسلت (6 أرقام)</div>
<input type="text" id="bracelet" maxlength="6" placeholder="Enter Bracelet No">

<div class="section-title">اسم الطفل</div>
<input type="text" id="childName" placeholder="Child Name">

<div class="section-title">الأصناف</div>
<div class="products" id="products"></div>

<div class="section-title">السلة</div>
<div class="cart" id="cart"></div>

<button onclick="submitOrder()">حفظ الأوردر</button>

</div>

<script src="config.js"></script>

<script>

let products = [];
let cart = [];

async function loadProducts(){

  const res = await fetch(API_URL + "?action=getProducts");
  products = await res.json();

  const container = document.getElementById("products");

  products.forEach(p=>{

    const div = document.createElement("div");
    div.className = "product";
    div.innerHTML = `
      <div>${p.productName}</div>
      <div class="small">${p.price} EGP</div>
    `;

    div.onclick = ()=>addToCart(p);

    container.appendChild(div);

  });

}

function addToCart(product){

  cart.push(product);
  renderCart();

}

function renderCart(){

  const container = document.getElementById("cart");
  container.innerHTML = "";

  let total = 0;

  cart.forEach((item,i)=>{

    total += item.price;

    container.innerHTML += `
      <div>
        ${item.productName} - ${item.price} EGP
      </div>
    `;

  });

  container.innerHTML += `<hr><b>Total: ${total} EGP</b>`;

}

async function submitOrder(){

  const bracelet = document.getElementById("bracelet").value;
  const childName = document.getElementById("childName").value;

  if(bracelet.length != 6){
    alert("لازم رقم بريسلت 6 أرقام");
    return;
  }

  alert("سيتم حفظ الأوردر (الخطوة التالية هنربطه بالـ Sheets)");

}

loadProducts();

</script>

</body>
</html>
