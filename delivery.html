<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<title>Delivery</title>

<style>

body{font-family:Arial;margin:0;background:#f5f5f5}
.header{background:#e74c3c;color:#fff;padding:15px;text-align:center}
.container{padding:15px}

.order{background:#fff;padding:10px;margin-bottom:10px;border-radius:10px}

button{width:100%;padding:10px;border:0;margin-top:5px;color:#fff;border-radius:8px}
.del{background:#27ae60}
.pay{background:#2980b9}

</style>

</head>

<body>

<div class="header">Delivery System</div>

<div class="container" id="orders"></div>

<script src="config.js"></script>

<script>

async function load(){

const res=await fetch(API_URL+"?action=getPendingOrders");
const data=await res.json();

let box=document.getElementById("orders");

data.forEach(o=>{

let div=document.createElement("div");
div.className="order";

div.innerHTML=`
<b>${o.orderId}</b><br>
${o.childName}<br>
${o.total} EGP
`;

let b1=document.createElement("button");
b1.className="del";
b1.innerText="Delivered";
b1.onclick=()=>update(o.orderId,"Delivered");

let b2=document.createElement("button");
b2.className="pay";
b2.innerText="Paid";
b2.onclick = async ()=>{

await update(o.orderId,"Paid");

window.open("invoice.html?id="+o.orderId,"_blank");

};
  
div.appendChild(b1);
div.appendChild(b2);

box.appendChild(div);

});

}

async function update(id,status){

await fetch(API_URL+"?action=updateOrderStatus",{
method:"POST",
body:JSON.stringify({orderId:id,status})
});

load();

}

load();

</script>

</body>
</html>
