<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<title>Cashier</title>

<style>

body{font-family:Arial;background:#f5f5f5;margin:0}
.header{background:#5B2C83;color:#fff;padding:15px;text-align:center}
.container{padding:15px}

input{width:100%;padding:12px;margin:8px 0;border-radius:10px}

.products{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.product{background:#fff;padding:10px;border-radius:10px;text-align:center;cursor:pointer}

.cart{background:#fff;padding:10px;margin-top:10px;border-radius:10px}

button{width:100%;padding:12px;margin-top:10px;background:#5B2C83;color:#fff;border:0;border-radius:10px}

</style>

</head>

<body>

<div class="header">Cashier System</div>

<div class="container">

<input id="bracelet" placeholder="Bracelet (6 digits)">
<input id="childName" placeholder="Child Name">

<div class="products" id="products"></div>

<div class="cart" id="cart"></div>

<button onclick="submitOrder()">Save Order</button>

</div>

<script src="config.js"></script>

<script>

let products=[];
let cart=[];

async function load(){

const res=await fetch(API_URL+"?action=getProducts");
products=await res.json();

const box=document.getElementById("products");

products.forEach(p=>{

let d=document.createElement("div");
d.className="product";
d.innerHTML=p.productName+"<br>"+p.price;

d.onclick=()=>{cart.push(p);render();};

box.appendChild(d);

});

}

function render(){

let c=document.getElementById("cart");
c.innerHTML="";
let total=0;

cart.forEach(i=>{
total+=i.price;
c.innerHTML+=i.productName+" - "+i.price+"<br>";
});

c.innerHTML+="<hr>Total: "+total;

}

async function submitOrder(){

const user=JSON.parse(localStorage.getItem("currentUser"));

await fetch(API_URL+"?action=createOrder",{
method:"POST",
body:JSON.stringify({
braceletNo:document.getElementById("bracelet").value,
childName:document.getElementById("childName").value,
cashierName:user.name,
items:cart
})
});

alert("Order Saved");
cart=[];render();

}

load();

</script>

</body>
</html>
