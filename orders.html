<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<title>Orders History</title>

<style>

body{font-family:Arial;margin:0;background:#f4f4f4}
.header{background:#2c3e50;color:#fff;padding:15px;text-align:center;position:relative}
.back{position:absolute;left:15px;top:10px;background:#5B2C83;color:#fff;border:0;border-radius:8px;padding:8px 15px;cursor:pointer}
.container{padding:12px}
.filters{background:#fff;padding:12px;border-radius:10px;display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:12px}
input,select,button{padding:10px;border:1px solid #ddd;border-radius:8px;box-sizing:border-box}
button{background:#5B2C83;color:#fff;border:0;cursor:pointer}
.table{background:#fff;border-radius:10px;overflow:auto}
table{width:100%;border-collapse:collapse;min-width:760px}
th,td{padding:10px;border-bottom:1px solid #eee;text-align:center}
th{background:#fafafa}
.status{font-weight:bold}
.empty{text-align:center;padding:20px;color:#777}

@media(max-width:800px){
  .filters{grid-template-columns:1fr}
}

</style>

</head>

<body>

<div class="header">
Orders History
<button class="back" onclick="window.location.href='dashboard.html'">Dashboard</button>
</div>

<div class="container">

<div class="filters">
  <input id="bracelet" placeholder="Bracelet">

  <select id="status">
    <option value="">All Statuses</option>
    <option value="Pending">Pending</option>
    <option value="Delivered">Delivered</option>
    <option value="Paid">Paid</option>
  </select>

  <input id="from" type="date">
  <input id="to" type="date">
  <button onclick="loadOrders()">Search</button>
</div>

<div class="table">
  <table>
    <thead>
      <tr>
        <th>Order</th>
        <th>Bracelet</th>
        <th>Child</th>
        <th>Cashier</th>
        <th>Time</th>
        <th>Status</th>
        <th>Total</th>
        <th>Invoice</th>
      </tr>
    </thead>
    <tbody id="orders"></tbody>
  </table>
  <div class="empty" id="empty" style="display:none">No orders found</div>
</div>

</div>

<script src="config.js"></script>

<script>

const user=localStorage.getItem("currentUser");

if(!user){
  window.location.href="index.html";
}

async function loadOrders(){

const params=new URLSearchParams({
  action:"getOrders",
  bracelet:document.getElementById("bracelet").value.trim(),
  status:document.getElementById("status").value,
  from:document.getElementById("from").value,
  to:document.getElementById("to").value
});

const res=await fetch(API_URL+"?"+params.toString());
const data=await res.json();
const box=document.getElementById("orders");
const empty=document.getElementById("empty");

box.innerHTML="";

if(!Array.isArray(data) || data.length==0){
  empty.style.display="block";
  return;
}

empty.style.display="none";

data.forEach(o=>{
  box.innerHTML+=`
  <tr>
    <td>${o.orderId}</td>
    <td>${o.bracelet}</td>
    <td>${o.childName}</td>
    <td>${o.cashier}</td>
    <td>${o.time}</td>
    <td class="status">${o.status}</td>
    <td>${o.total} EGP</td>
    <td><button onclick="printInvoice('${o.orderId}')">Print</button></td>
  </tr>
  `;
});

}

function printInvoice(orderId){
  window.open("invoice.html?id="+orderId,"_blank");
}

loadOrders();

</script>

</body>
</html>
